var punchIn=false;
function startClock(){
  var el=document.getElementById('punch-clock');
  var de=document.getElementById('punch-date');
  if(!el)return;
  function upd(){
    var now=new Date();
    if(el)el.textContent=now.toLocaleTimeString('he-IL');
    if(de)de.textContent=now.toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  }
  upd();setInterval(upd,1000);
}
function togglePunch(){
  punchIn=!punchIn;
  var btn=document.getElementById('btn-punch');
  var st=document.getElementById('punch-status');
  if(punchIn){
    btn.className='btn-punch btn-punch-out';btn.innerHTML='\u{1F534} \u05d9\u05e6\u05d9\u05d0\u05d4 \u05de\u05e2\u05d1\u05d5\u05d3\u05d4';
    st.className='punch-status punch-in';st.textContent='\u05d1\u05e2\u05d1\u05d5\u05d3\u05d4 \u05de-'+nowTime();
    toast('\u2705 \u05db\u05e0\u05d9\u05e1\u05d4 \u05e0\u05e8\u05e9\u05de\u05d4: '+nowTime(),'ok');
  }else{
    btn.className='btn-punch btn-punch-in';btn.innerHTML='\u{1F7E2} \u05db\u05e0\u05d9\u05e1\u05d4 \u05dc\u05e2\u05d1\u05d5\u05d3\u05d4';
    st.className='punch-status punch-out';st.textContent='\u05dc\u05d0 \u05de\u05d7\u05d5\u05d9\u05d1';
    toast('\u{1F44B} \u05d9\u05e6\u05d9\u05d0\u05d4 \u05e0\u05e8\u05e9\u05de\u05d4. \u05d9\u05d5\u05dd \u05d8\u05d5\u05d1!','warn');
  }
}
function calcKM(){
  var d=parseFloat(document.getElementById('km-dist').value||0);
  var p=parseFloat(document.getElementById('km-price').value||1.5);
  var t=document.getElementById('km-total');
  if(t)t.value='\u20aa'+(d*p).toFixed(2);
}
function submitKM(){
  var f=document.getElementById('km-from').value;
  var to=document.getElementById('km-to').value;
  var d=document.getElementById('km-dist').value;
  if(!f||!to||!d){toast('\u05e0\u05d0 \u05dc\u05de\u05dc\u05d0 \u05d0\u05ea \u05db\u05dc \u05d4\u05e9\u05d3\u05d5\u05ea','err');return}
  toast('\u2705 \u05d3\u05d9\u05d5\u05d5\u05d7 \u05e0\u05e9\u05dc\u05d7! '+d+' km','ok');
  document.getElementById('km-from').value='';
  document.getElementById('km-to').value='';
  document.getElementById('km-dist').value='';
  document.getElementById('km-total').value='';
}
function approve(btn){
  var row=btn.closest('tr');
  row.querySelector('td:last-child').innerHTML='<span class="status s-ok">\u{1F7E2} \u05d0\u05d5\u05e9\u05e8</span>';
  toast('\u2705 \u05d4\u05d3\u05d9\u05d5\u05d5\u05d7 \u05d0\u05d5\u05e9\u05e8!','ok');
}
function reject(btn){
  var row=btn.closest('tr');
  row.querySelector('td:last-child').innerHTML='<span class="status s-rejected">\u{1F534} \u05e0\u05d3\u05d7\u05d4</span>';
  toast('\u274C \u05d4\u05d3\u05d9\u05d5\u05d5\u05d7 \u05e0\u05d3\u05d7\u05d4','err');
}


function openCam(){
  document.getElementById('cam-modal').classList.add('open');
  resetCam();startCamera();
}
function closeCam(){stopCamera();document.getElementById('cam-modal').classList.remove('open')}
function resetCam(){
  document.getElementById('ai-analyzing').style.display='none';
  document.getElementById('receipt-form').classList.remove('show');
  document.getElementById('cam-wrap').style.display='block';
  document.querySelector('.camera-actions').style.display='flex';
  manualEdited=false;
  document.getElementById('manual-tag').style.display='none';
}
async function startCamera(){
  try{
    var stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    camStream=stream;
    var video=document.getElementById('camera-video');
    video.srcObject=stream;
    simulateQuality();
  }catch(e){
    toast('\u05dc\u05d0 \u05e0\u05d9\u05ea\u05df \u05dc\u05d2\u05e9\u05ea \u05dc\u05de\u05e6\u05dc\u05de\u05d4. \u05d4\u05e9\u05ea\u05de\u05e9 \u05d1\u05d4\u05e2\u05dc\u05d0\u05ea \u05ea\u05de\u05d5\u05e0\u05d4','warn');
    document.getElementById('cam-wrap').style.display='none';
  }
}
function stopCamera(){if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null}}
var qt=null;
function simulateQuality(){
  var hints=['\u05d9\u05d9\u05e9\u05e8 \u05d0\u05ea \u05d4\u05e7\u05d1\u05dc\u05d4 \u05d1\u05ea\u05d5\u05da \u05d4\u05de\u05e1\u05d2\u05e8\u05ea','\u05e7\u05e8\u05d1 \u05e7\u05e6\u05ea \u05d9\u05d5\u05ea\u05e8 \u05dc\u05e7\u05d1\u05dc\u05d4','\u05d4\u05e6\u05d9\u05dc\u05d5\u05dd \u05de\u05d8\u05d5\u05e9\u05d8\u05e9 - \u05d4\u05d7\u05d6\u05e7 \u05d1\u05e2\u05d3\u05d9\u05e0\u05d5\u05ea','\u05de\u05e6\u05d5\u05d9\u05df! \u05dc\u05d7\u05e5 \u05dc\u05e6\u05d9\u05dc\u05d5\u05dd \u{1F4F7}'];
  var i=0;
  qt=setInterval(function(){
    var hint=document.getElementById('cam-hint');
    var frame=document.getElementById('cam-frame');
    if(!hint){clearInterval(qt);return}
    var good=i%hints.length===3;
    hint.textContent=hints[i%hints.length];
    hint.className='camera-hint '+(good?'good':'bad');
    frame.style.borderColor=good?'rgba(34,197,94,.9)':'rgba(239,68,68,.7)';
    i++;
    if(i>=hints.length)clearInterval(qt);
  },1200);
}
function capturePhoto(){if(qt)clearInterval(qt);stopCamera();analyzeReceipt()}
function handleFileUpload(e){var f=e.target.files[0];if(!f)return;stopCamera();analyzeReceipt()}
function analyzeReceipt(){
  document.getElementById('cam-wrap').style.display='none';
  document.querySelector('.camera-actions').style.display='none';
  document.getElementById('ai-analyzing').style.display='block';
  setTimeout(function(){
    document.getElementById('ai-analyzing').style.display='none';
    fillAI();
    document.getElementById('receipt-form').classList.add('show');
  },2200);
}

  var s=[
    {a:'89.90',b:'\u05e1\u05d5\u05e4\u05e8-\u05e4\u05d0\u05e8\u05dd',c:'equipment'},
    {a:'145.00',b:'McDonald's',c:'food'},
    {a:'32.00',b:'\u05e4\u05d6',c:'parking'},
    {a:'280.00',b:'Office Depot',c:'equipment'},
    {a:'67.50',b:'\u05e7\u05e4\u05d4 \u05d2\u05e8\u05d2',c:'food'}
  ];
  var r=s[Math.floor(Math.random()*s.length)];
  document.getElementById('r-amount').value=r.a;
  document.getElementById('r-date').value=today();

function markManual(){
  if(!manualEdited){manualEdited=true;document.getElementById('manual-tag').style.display='inline-block'}
}
function setType(type){
  expenseType=type;
  ['petty','personal','card'].forEach(function(t){
    var el=document.getElementById('t-'+t);
    if(el)el.classList.toggle('active',t===type);
  });
}
function submitReceipt(){
  var amount=document.getElementById('r-amount').value;
  var biz=document.getElementById('r-biz').value;
  if(!amount||!biz){toast('\u05e0\u05d0 \u05dc\u05de\u05dc\u05d0 \u05e1\u05db\u05d5\u05dd \u05d5\u05e9\u05dd \u05e2\u05e1\u05e7','err');return}
  var tl={'petty':'\u05e7\u05d5\u05e4\u05d4 \u05e7\u05d8\u05e0\u05d4','personal':'\u05d4\u05d7\u05d6\u05e8 \u05d0\u05d9\u05e9\u05d9','card':'\u05db\u05e8\u05d8\u05d9\u05e1 \u05e2\u05de\u05d5\u05ea\u05d4'};
  toast('\u2705 \u05e0\u05e9\u05dc\u05d7! \u20aa'+amount+' - '+biz+' ('+tl[expenseType]+')','ok');
  closeCam();
}
async function init(){
  document.getElementById('loading').style.display='flex';
  try{
    var r=await sb.auth.getSession();
    var session=r.data.session;
    if(session){
      var pr=await sb.from('profiles').select('*').eq('id',session.user.id).single();
      if(pr.data){CU=session.user;CP=pr.data;VR=pr.data.role;initApp();document.getElementById('app').style.display='block';}
      else showLogin();
    }else showLogin();
  }catch(e){showLogin();}
  finally{document.getElementById('loading').style.display='none';}
}
function showLogin(){document.getElementById('login-screen').style.display='flex';}
var sk=localStorage.getItem('oai_key');
if(sk){var kEl=document.getElementById('ai-key');if(kEl)kEl.value=sk;}
init();
