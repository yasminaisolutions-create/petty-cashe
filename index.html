<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PettyCash AI - ניהול קופה קטנה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F0F4F8;--white:#fff;--blue:#3B82F6;--blue-dk:#1D4ED8;--blue-lt:#EFF6FF;--blue-mid:#BFDBFE;--teal:#0D9488;--text:#1E293B;--text-lt:#64748B;--border:#E2E8F0;--danger:#EF4444;--danger-lt:#FEF2F2;--ok:#22C55E;--ok-lt:#F0FDF4;--warn:#F59E0B;--warn-lt:#FFFBEB;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Heebo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}
#loading{position:fixed;inset:0;background:linear-gradient(135deg,#EFF6FF,#F0FDF4);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#loading .logo{font-size:32px;font-weight:900;color:var(--blue)}
#loading .logo span{color:var(--text)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin-top:16px}
@keyframes spin{to{transform:rotate(360deg)}}
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:8px;min-width:280px}
.toast-item{padding:12px 20px;border-radius:10px;font-weight:600;font-size:14px;box-shadow:var(--shadow);animation:slideIn .3s ease}
.toast-item.ok{background:var(--ok-lt);color:#166534;border:1px solid #bbf7d0}
.toast-item.err{background:var(--danger-lt);color:#991b1b;border:1px solid #fecaca}
.toast-item.warn{background:var(--warn-lt);color:#92400e;border:1px solid #fde68a}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--white);border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 10px 40px rgba(0,0,0,.1)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:28px;font-weight:900;color:var(--blue)}
.login-logo h1 span{color:var(--text)}
.login-logo p{font-size:14px;color:var(--text-lt);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-lt);margin-bottom:6px}
.form-group input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:15px;color:var(--text);background:var(--bg);transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--blue);background:var(--white)}
.btn-login{width:100%;padding:13px;background:var(--blue);color:var(--white);border:none;border-radius:10px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px}
.btn-login:hover{background:var(--blue-dk)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.login-err{display:none;background:var(--danger-lt);color:var(--danger);border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;text-align:center}
.demo-hint{margin-top:20px;border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.demo-hint-header{padding:10px 16px;background:var(--bg);font-size:13px;font-weight:600;color:var(--text-lt);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.demo-hint-body{display:none;padding:12px}
.demo-hint-body.open{display:block}
.demo-card{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .2s}
.demo-card:last-child{margin-bottom:0}
.demo-card:hover{border-color:var(--blue);background:var(--blue-lt)}
.demo-card .dc-name{font-weight:700;font-size:14px}
.demo-card .dc-email{font-size:12px;color:var(--text-lt)}
.demo-card .dc-role{font-size:11px;font-weight:600;margin-top:4px;padding:2px 8px;border-radius:20px;display:inline-block}
.role-admin{background:#fce7f3;color:#9d174d}
.role-field{background:#dbeafe;color:#1d4ed8}
.role-manager{background:#dcfce7;color:#166534}
.role-finance{background:#fef3c7;color:#92400e}
#app{display:none}
.app-header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.app-header .logo{font-size:20px;font-weight:900;color:var(--blue)}
.app-header .logo span{color:var(--text)}
.header-right{display:flex;align-items:center;gap:12px}
.user-info{font-size:13px;color:var(--text-lt)}
.user-info strong{color:var(--text);font-weight:700}
.btn-logout{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);font-family:inherit;font-size:13px;font-weight:600;color:var(--text-lt);cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}
.role-switch-bar{background:var(--blue-lt);border-bottom:1px solid var(--blue-mid);padding:8px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.role-switch-bar span{font-size:12px;font-weight:700;color:var(--blue-dk)}
.btn-role-view{padding:5px 12px;border:1.5px solid var(--blue-mid);border-radius:20px;background:var(--white);font-family:inherit;font-size:12px;font-weight:600;color:var(--blue-dk);cursor:pointer;transition:all .2s}
.btn-role-view:hover,.btn-role-view.active{background:var(--blue);color:var(--white);border-color:var(--blue)}
.main-nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto}
.nav-tab{padding:14px 16px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--text-lt);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .2s}
.nav-tab:hover{color:var(--blue)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.app-content{padding:24px;max-width:1100px;margin:0 auto}
.page-section{display:none}
.page-section.active{display:block}
.section-title{font-size:22px;font-weight:800;margin-bottom:20px;color:var(--text)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:14px;padding:20px;box-shadow:var(--shadow);text-align:center}
.stat-card .stat-num{font-size:32px;font-weight:900;color:var(--blue)}
.stat-card .stat-lbl{font-size:13px;color:var(--text-lt);margin-top:4px;font-weight:500}
.card{background:var(--white);border-radius:14px;padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)}
.btn{padding:10px 18px;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover{background:var(--blue-dk)}
.btn-success{background:var(--ok);color:var(--white)}
.btn-danger{background:var(--danger);color:var(--white)}
.btn-outline{background:var(--white);color:var(--blue);border:1.5px solid var(--blue)}
.expenses-table{width:100%;border-collapse:collapse;font-size:14px}
.expenses-table th{background:var(--bg);padding:10px 14px;text-align:right;font-weight:700;color:var(--text-lt);border-bottom:2px solid var(--border)}
.expenses-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text)}
.expenses-table tr:hover td{background:var(--bg)}
.status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.status-pending{background:var(--warn-lt);color:#92400e}
.status-approved{background:var(--ok-lt);color:#166534}
.status-rejected{background:var(--danger-lt);color:#991b1b}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;padding:32px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:20px;font-weight:800;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">PettyCash <span>AI</span></div>
  <div class="spinner"></div>
  <div style="margin-top:12px;font-size:14px;color:#64748B">טוען...</div>
</div>

<div id="toast-container"></div>

<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <h1>PettyCash <span>AI</span></h1>
      <p>מערכת ניהול קופה קטנה לארגונים</p>
    </div>
    <div class="form-group">

          <div class="dc-name">יסמין (בעלים)</div>
          <div class="dc-email">yasminko27@gmail.com</div>
          <div class="dc-role role-admin">אדמין</div>
        </div>
        <div class="demo-card" onclick="fillLogin('dana@pettycash.app','Test123456')">
          <div class="dc-name">דנה שמש</div>
          <div class="dc-email">dana@pettycash.app</div>
          <div class="dc-role role-field">רכזת שטח</div>

          <div class="dc-name">מיכל כהן</div>

        </div>
        <div class="demo-card" onclick="fillLogin('yossi@pettycash.app','Test123456')">
          <div class="dc-name">יוסי לוי</div>
          <div class="dc-email">yossi@pettycash.app</div>
          <div class="dc-role role-finance">כספים</div>

  </div>
</div>

<div id="app">
  <header class="app-header">
    <div class="logo">PettyCash <span>AI</span></div>

      <div class="user-info">שלום, <strong id="hdr-name">-</strong> | <span id="hdr-role-label">-</span></div>

    <button class="btn-role-view" onclick="switchView('admin')">אדמין (שלי)</button>
  </div>
  <nav class="main-nav" id="main-nav"></nav>
  <div class="app-content" id="app-content"></div>
</div>

<script>
const SUPA_URL = 'https://soqxqmpoertwxkwhlzen.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvcXhxbXBvZXJ0d3hrd2hsemVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODc0NzYsImV4cCI6MjA5MzA2MzQ3Nn0.umDsrKOVKyA9tWnwtDHy-TgXl6MFT_JzA_fmNbCXeZI';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let currentProfile = null;
let viewingRole = null;

function toast(msg, type='ok', dur=3500) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast-item ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), dur);
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function fillLogin(email, pass) {
  document.getElementById('login-email').value = email;
  document.getElementById('login-pass').value = pass;
  document.getElementById('login-email').focus();
}

document.getElementById('demo-toggle').addEventListener('click', function() {
  const body = document.getElementById('demo-body');
  const arrow = document.getElementById('demo-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
});

document.getElementById('login-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

document.getElementById('btn-login-submit').addEventListener('click', doLogin);

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('btn-login-submit');

  errEl.style.display = 'none';
  if (!email || !pass) {
    errEl.textContent = 'נא למלא אימייל וסיסמה';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'מתחבר...';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;

    const profile = await loadProfile(data.user);
    if (!profile) throw new Error('פרופיל משתמש לא נמצא. פנה למנהל המערכת.');

    currentUser = data.user;
    currentProfile = profile;
    viewingRole = profile.role;
    initApp();
    showApp();
    toast('ברוך הבא, ' + profile.full_name + '!', 'ok');
  } catch(e) {
    errEl.textContent = e.message === 'Invalid login credentials' ? 'אימייל או סיסמה שגויים' : (e.message || 'שגיאת כניסה');
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'כניסה למערכת';
  }
}

async function loadProfile(user) {
  const { data, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (error) {
    console.error('Profile error:', error);
    return null;
  }
  return data;
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  currentProfile = null;
  viewingRole = null;
  showLogin();
  toast('יצאת מהמערכת', 'warn');
}

function switchView(role) {
  viewingRole = role;
  document.querySelectorAll('.btn-role-view').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes("'" + role + "'"));
  });
  renderNav();
  renderContent();
  toast('מציג ממשק: ' + roleLabel(role), 'warn', 2000);
}

function roleLabel(r) {
  return {field:'רכזת שטח', manager:'מנהל', finance:'כספים', admin:'אדמין'}[r] || r;
}

function initApp() {
  const p = currentProfile;
  document.getElementById('hdr-name').textContent = p.full_name;
  document.getElementById('hdr-role-label').textContent = roleLabel(p.role);

  if (p.role === 'admin') {
    document.getElementById('role-switch-bar').style.display = 'flex';
  }

  renderNav();
  renderContent();
}

function getTabs() {
  const role = viewingRole;
  const tabs = [];
  tabs.push({ id: 'field', label: '📋 הגשת דיווח' });
  if (role === 'manager' || role === 'finance' || role === 'admin') {
    tabs.push({ id: 'manager', label: '✅ אישורים' });
  }
  if (role === 'finance' || role === 'admin') {
    tabs.push({ id: 'finance', label: '💰 דוחות כספיים' });
  }
  if (role === 'admin') {
    tabs.push({ id: 'admin', label: '⚙️ ניהול' });
  }
  return tabs;
}

function renderNav() {
  const tabs = getTabs();
  const nav = document.getElementById('main-nav');
  nav.innerHTML = tabs.map((t, i) =>
    '<button class="nav-tab' + (i===0?' active':'') + '" data-tab="' + t.id + '" onclick="showTab(\'' + t.id + '\')">' + t.label + '</button>'
  ).join('');
}

function showTab(id) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.page-section').forEach(s => s.classList.toggle('active', s.id === 'sec-'+id));
}

function renderContent() {
  const tabs = getTabs();
  const role = viewingRole;
  let html = '';

  html += '<div class="page-section active" id="sec-field">';
  html += '<h2 class="section-title">📋 הגשת דיווח הוצאה</h2>';
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-num">12</div><div class="stat-lbl">דיווחים החודש</div></div>';
  html += '<div class="stat-card"><div class="stat-num">3</div><div class="stat-lbl">ממתינים לאישור</div></div>';
  html += '<div class="stat-card"><div class="stat-num">₪2,340</div><div class="stat-lbl">סה"כ הוגש</div></div>';
  html += '</div>';
  html += '<div class="card"><div class="card-title">הגשת הוצאה חדשה</div>';
  html += '<div class="form-row"><div class="form-group"><label>קטגוריה</label><input type="text" placeholder="נסיעות / מזון / ציוד"></div>';
  html += '<div class="form-group"><label>סכום (₪)</label><input type="number" placeholder="0.00"></div></div>';
  html += '<div class="form-group"><label>תיאור</label><input type="text" placeholder="פרטי ההוצאה"></div>';
  html += '<div class="form-group"><label>תאריך</label><input type="date"></div>';
  html += '<button class="btn btn-primary" style="margin-top:8px">📤 שלח לאישור</button></div>';
  html += '<div class="card"><div class="card-title">הדיווחים שלי</div>';
  html += '<table class="expenses-table"><thead><tr><th>תאריך</th><th>קטגוריה</th><th>סכום</th><th>סטטוס</th></tr></thead>';
  html += '<tbody>';
  html += '<tr><td>01/05/2026</td><td>נסיעות</td><td>₪150</td><td><span class="status-badge status-approved">אושר</span></td></tr>';
  html += '<tr><td>03/05/2026</td><td>מזון</td><td>₪85</td><td><span class="status-badge status-pending">ממתין</span></td></tr>';
  html += '<tr><td>05/05/2026</td><td>ציוד</td><td>₪320</td><td><span class="status-badge status-pending">ממתין</span></td></tr>';
  html += '</tbody></table></div>';
  html += '</div>';

  if (role === 'manager' || role === 'finance' || role === 'admin') {
    html += '<div class="page-section" id="sec-manager">';
    html += '<h2 class="section-title">✅ אישור דיווחים</h2>';
    html += '<div class="stats-grid">';
    html += '<div class="stat-card"><div class="stat-num">7</div><div class="stat-lbl">ממתינים לאישור</div></div>';
    html += '<div class="stat-card"><div class="stat-num">23</div><div class="stat-lbl">אושרו החודש</div></div>';
    html += '<div class="stat-card"><div class="stat-num">₪8,920</div><div class="stat-lbl">סה"כ אושר</div></div>';
    html += '</div>';
    html += '<div class="card"><div class="card-title">דיווחים ממתינים לאישור</div>';
    html += '<table class="expenses-table"><thead><tr><th>מגיש</th><th>תאריך</th><th>קטגוריה</th><th>סכום</th><th>פעולה</th></tr></thead>';
    html += '<tbody>';
    html += '<tr><td>דנה שמש</td><td>03/05/2026</td><td>מזון</td><td>₪85</td><td><button class="btn btn-success" style="padding:5px 12px;font-size:12px">אשר</button> <button class="btn btn-danger" style="padding:5px 12px;font-size:12px">דחה</button></td></tr>';

async function init() {
  showLoading(true);
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const profile = await loadProfile(session.user);
      if (profile) {
        currentUser = session.user;
        currentProfile = profile;
        viewingRole = profile.role;
        initApp();
        showApp();
      } else {
        showLogin();
      }
    } else {
      showLogin();
    }
  } catch(e) {
    console.error('Init error:', e);
    showLogin();
  } finally {
    showLoading(false);
  }
}

init();
